services:
  # Backend FastAPI Service
  - type: web
    name: auto-readme-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend React Static Site
  - type: web
    name: auto-readme-frontend
    env: static
    buildCommand: npm install && npm run build
    publishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://auto-readme-backend.onrender.com
